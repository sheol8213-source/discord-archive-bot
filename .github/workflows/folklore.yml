name: Daily Folklore Post

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  folklore:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run scraper
        run: |
          pip install requests beautifulsoup4
          python scraper.py
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
